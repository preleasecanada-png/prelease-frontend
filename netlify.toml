[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "10"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  NEXT_PUBLIC_BASE_API_HOST = "https://your-api-gateway-url.execute-api.us-east-1.amazonaws.com/api"
  NEXT_PUBLIC_BASE_LOCAL_IMAGE_HOST = "https://prelease-storage-production.s3.us-east-1.amazonaws.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "https://your-api-gateway-url.execute-api.us-east-1.amazonaws.com/api/:splat"
  status = 200
